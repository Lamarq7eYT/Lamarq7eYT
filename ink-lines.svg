<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 118" width="860" height="118" role="img" aria-labelledby="title desc">
  <title id="title">Animated white ink skill lines</title>
  <desc id="desc">White ink phrases appear as splashes and vanish through black ink cuts.</desc>
  <defs>
    <style>
      .bg { fill: #050505; }
      .paper { fill: #ffffff; }
      .black { fill: #050505; }
      .line {
        font-family: 'Courier New', Courier, monospace;
        font-size: 23px;
        font-weight: 900;
        letter-spacing: 1px;
        fill: #ffffff;
      }
      .label {
        font-family: 'Courier New', Courier, monospace;
        font-size: 11px;
        font-weight: 900;
        letter-spacing: 3px;
        fill: #ffffff;
      }
      .hole { fill: #ffffff; opacity: .92; }
      @keyframes phrase {
        0%, 8% { opacity: 0; transform: translateY(10px) scale(.985); }
        15%, 70% { opacity: 1; transform: translateY(0) scale(1); }
        82%, 100% { opacity: 0; transform: translateY(-6px) scale(1.015); }
      }
      @keyframes splash {
        0%, 8% { opacity: 0; transform: scale(.2) translateX(-90px); }
        18%, 32% { opacity: .9; transform: scale(1) translateX(0); }
        64% { opacity: .26; }
        82%, 100% { opacity: 0; transform: scale(1.12) translateX(90px); }
      }
      @keyframes cut {
        0%, 58% { transform: translateX(-900px) skewX(-16deg); opacity: 0; }
        68%, 82% { opacity: 1; }
        100% { transform: translateX(900px) skewX(-16deg); opacity: 0; }
      }
      @keyframes drip {
        0%, 100% { transform: translateY(0); opacity: .5; }
        50% { transform: translateY(11px); opacity: 1; }
      }
      @keyframes blink {
        0%, 100% { opacity: .25; }
        50% { opacity: 1; }
      }
      .p1 { animation: phrase 10s steps(2, end) infinite; }
      .p2 { animation: phrase 10s steps(2, end) 2s infinite; }
      .p3 { animation: phrase 10s steps(2, end) 4s infinite; }
      .p4 { animation: phrase 10s steps(2, end) 6s infinite; }
      .p5 { animation: phrase 10s steps(2, end) 8s infinite; }
      .s1 { animation: splash 10s ease-in-out infinite; transform-origin: 430px 59px; }
      .s2 { animation: splash 10s ease-in-out 2s infinite; transform-origin: 430px 59px; }
      .s3 { animation: splash 10s ease-in-out 4s infinite; transform-origin: 430px 59px; }
      .s4 { animation: splash 10s ease-in-out 6s infinite; transform-origin: 430px 59px; }
      .s5 { animation: splash 10s ease-in-out 8s infinite; transform-origin: 430px 59px; }
      .cut { animation: cut 10s ease-in-out infinite; }
      .d1 { animation: drip 3.2s ease-in-out infinite; }
      .d2 { animation: drip 3.7s ease-in-out .4s infinite; }
      .d3 { animation: drip 3.4s ease-in-out .8s infinite; }
      .b1 { animation: blink 2.4s steps(2, end) infinite; }
      .b2 { animation: blink 2.4s steps(2, end) .5s infinite; }
      .b3 { animation: blink 2.4s steps(2, end) 1s infinite; }
    </style>
  </defs>

  <rect class="bg" width="860" height="118"/>
  <rect class="paper" x="34" y="18" width="792" height="82" rx="4" opacity=".05"/>
  <rect class="paper" x="34" y="18" width="792" height="2" opacity=".38"/>
  <rect class="paper" x="34" y="98" width="792" height="2" opacity=".38"/>

  <g opacity=".9">
    <rect class="hole" x="51" y="30" width="16" height="10"/>
    <rect class="hole" x="51" y="54" width="16" height="10"/>
    <rect class="hole" x="51" y="78" width="16" height="10"/>
    <rect class="hole" x="793" y="30" width="16" height="10"/>
    <rect class="hole" x="793" y="54" width="16" height="10"/>
    <rect class="hole" x="793" y="78" width="16" height="10"/>
  </g>

  <g class="s1">
    <path class="paper" d="M191 49C258 20 311 64 378 39C453 10 513 64 590 35C633 19 672 30 704 34V80C648 94 606 67 548 87C474 113 420 66 350 92C283 117 236 75 191 92Z" opacity=".16"/>
    <circle class="paper b1" cx="229" cy="40" r="5"/>
    <circle class="paper b2" cx="640" cy="82" r="6"/>
  </g>
  <g class="s2">
    <path class="paper" d="M155 72C223 39 289 82 356 57C432 28 491 84 569 54C626 33 675 48 727 43V88C657 96 612 75 548 95C477 118 420 77 350 100C285 121 222 82 155 101Z" opacity=".16"/>
    <circle class="paper b2" cx="191" cy="80" r="5"/>
    <circle class="paper b3" cx="708" cy="48" r="5"/>
  </g>
  <g class="s3">
    <path class="paper" d="M164 46C237 21 292 63 363 39C436 15 496 66 572 36C632 12 683 34 730 29V75C666 83 615 64 548 84C474 105 418 67 348 90C280 112 225 72 164 90Z" opacity=".18"/>
    <circle class="paper b1" cx="323" cy="34" r="6"/>
    <circle class="paper b3" cx="566" cy="84" r="5"/>
  </g>
  <g class="s4">
    <path class="paper" d="M143 58C215 30 282 75 352 49C425 21 486 78 562 48C623 24 681 42 735 38V83C669 94 613 70 545 92C476 114 421 77 350 98C280 119 217 82 143 100Z" opacity=".17"/>
    <circle class="paper b2" cx="245" cy="48" r="5"/>
    <circle class="paper b1" cx="688" cy="70" r="6"/>
  </g>
  <g class="s5">
    <path class="paper" d="M178 48C243 20 306 65 373 38C445 9 508 64 584 37C636 18 678 28 715 31V78C654 91 609 65 545 87C471 112 417 67 348 92C283 116 232 75 178 93Z" opacity=".18"/>
    <circle class="paper b3" cx="204" cy="52" r="5"/>
    <circle class="paper b2" cx="650" cy="43" r="5"/>
  </g>

  <text class="line p1" x="430" y="66" text-anchor="middle">FRAME 01 - FULL-STACK DEVELOPER</text>
  <text class="line p2" x="430" y="66" text-anchor="middle">FRAME 02 - SECURITY ENGINEERING STUDENT</text>
  <text class="line p3" x="430" y="66" text-anchor="middle">FRAME 03 - PYTHON + JS/TS + RUST + ASSEMBLY</text>
  <text class="line p4" x="430" y="66" text-anchor="middle">FRAME 04 - MAJOR JAVASCRIPT/TYPESCRIPT FRAMEWORKS</text>
  <text class="line p5" x="430" y="66" text-anchor="middle">FRAME 05 - BLACK INK / WHITE FRAMES / COLORED MOTION</text>

  <g class="cut">
    <path class="black" d="M0 34H260L230 86H0Z"/>
    <path class="black" d="M312 28H520L482 92H276Z"/>
    <path class="black" d="M575 34H860V88H540Z"/>
  </g>

  <circle class="paper d1" cx="116" cy="22" r="4"/>
  <circle class="paper d2" cx="754" cy="24" r="5"/>
  <circle class="paper d3" cx="423" cy="99" r="4"/>
  <text class="label" x="430" y="94" text-anchor="middle">INK SPLASH / FRAME CUT / NO TYPING</text>
</svg>
