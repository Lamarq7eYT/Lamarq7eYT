<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 210" width="860" height="210" role="img" aria-labelledby="title desc">
  <title id="title">Lamarq7eYT - Frame a Frame Developer Profile</title>
  <desc id="desc">A frame-by-frame animation themed GitHub profile header spelling Lamarq7eYT.</desc>
  <defs>
    <style>
      .bg { fill: #0d1117; }
      .rail { fill: #101820; stroke: #26323f; stroke-width: 1; }
      .frame { fill: #0f1720; stroke: #00ff88; stroke-width: 1.5; }
      .frame-alt { stroke: #00e5ff; }
      .frame-hot { stroke: #ff2d6b; }
      .letter {
        font-family: 'Courier New', Courier, monospace;
        font-size: 38px;
        font-weight: 900;
        fill: #00ff88;
      }
      .title {
        font-family: 'Courier New', Courier, monospace;
        font-size: 28px;
        font-weight: 900;
        letter-spacing: 4px;
        fill: #c9d1d9;
      }
      .sub {
        font-family: 'Courier New', Courier, monospace;
        font-size: 15px;
        font-weight: 700;
        letter-spacing: 3px;
        fill: #8b949e;
      }
      .label {
        font-family: 'Courier New', Courier, monospace;
        font-size: 10px;
        font-weight: 700;
        fill: #8b949e;
      }
      .scan { fill: #00ff88; opacity: .08; }
      .cyan { fill: #00e5ff; }
      .pink { fill: #ff2d6b; }
      @keyframes pop {
        0%, 100% { opacity: .72; transform: translateY(0); }
        45% { opacity: 1; transform: translateY(-3px); }
      }
      @keyframes sweep {
        0% { transform: translateX(-860px); opacity: 0; }
        20% { opacity: .5; }
        80% { opacity: .5; }
        100% { transform: translateX(860px); opacity: 0; }
      }
      .f01 { animation: pop 2.4s steps(2, end) infinite; }
      .f02 { animation: pop 2.4s steps(2, end) .12s infinite; }
      .f03 { animation: pop 2.4s steps(2, end) .24s infinite; }
      .f04 { animation: pop 2.4s steps(2, end) .36s infinite; }
      .f05 { animation: pop 2.4s steps(2, end) .48s infinite; }
      .f06 { animation: pop 2.4s steps(2, end) .60s infinite; }
      .f07 { animation: pop 2.4s steps(2, end) .72s infinite; }
      .f08 { animation: pop 2.4s steps(2, end) .84s infinite; }
      .f09 { animation: pop 2.4s steps(2, end) .96s infinite; }
      .f10 { animation: pop 2.4s steps(2, end) 1.08s infinite; }
      .sweep { animation: sweep 4.5s linear infinite; }
    </style>
  </defs>

