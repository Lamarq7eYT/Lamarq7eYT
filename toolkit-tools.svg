<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 300" width="860" height="300" role="img" aria-labelledby="title desc">
  <title id="title">Web data tools and motion toolkit reel</title>
  <desc id="desc">Custom film and ink SVG badges for web, data, tools, and motion stack.</desc>
  <defs>
    <style>
      .bg{fill:#050505}.paper{fill:#ffffff}.ink{fill:#ffffff;stroke:#050505;stroke-width:2}.card{fill:#ffffff;stroke:#050505;stroke-width:2}
      .title{font-family:'Courier New',Courier,monospace;font-size:18px;font-weight:900;letter-spacing:3px;fill:#ffffff}
      .name{font-family:'Courier New',Courier,monospace;font-size:13px;font-weight:900;letter-spacing:1px;fill:#050505}
      .icon{font-family:'Courier New',Courier,monospace;font-size:18px;font-weight:900}
      .small{font-family:'Courier New',Courier,monospace;font-size:9px;font-weight:900;fill:#ffffff;letter-spacing:2px}
      @keyframes lift{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}@keyframes pass{0%{transform:translateX(-230px);opacity:0}25%,75%{opacity:.65}100%{transform:translateX(900px);opacity:0}}
      .a1{animation:lift 3s steps(2,end) infinite}.a2{animation:lift 3s steps(2,end) .18s infinite}.a3{animation:lift 3s steps(2,end) .36s infinite}.a4{animation:lift 3s steps(2,end) .54s infinite}.a5{animation:lift 3s steps(2,end) .72s infinite}.wipe{animation:pass 5.4s linear infinite}
    </style>
  </defs>
  <rect class="bg" width="860" height="300"/>
  <path class="paper" d="M0 0H860V24C782 15 731 35 652 22C574 9 507 35 430 21C352 8 291 8 219 23C142 40 69 14 0 30Z"/>
  <path class="paper" d="M0 274C78 284 139 262 218 276C295 290 355 269 430 279C509 291 574 267 652 278C733 289 790 276 860 268V300H0Z"/>
  <rect class="paper" x="20" y="40" width="820" height="2" opacity=".65"/><rect class="paper" x="20" y="248" width="820" height="2" opacity=".65"/>
  <g class="wipe"><path class="paper" d="M20 106C76 85 119 124 177 101C234 79 280 122 338 98V142C273 163 235 118 174 146C112 174 75 129 20 151Z" opacity=".14"/></g>
  <text class="title" x="430" y="31" text-anchor="middle">WEB / DATA / TOOLS / MOTION</text>
  <text class="small" x="430" y="282" text-anchor="middle">HTML5 / CSS3 / SQL / DATABASES / DOCKER / GIT / GITHUB / LINUX / EDITORS / THREE / WEBGL / BLENDER</text>
  <g transform="translate(44 58)">
